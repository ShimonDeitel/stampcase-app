name: Stampcase
options:
  bundleIdPrefix: com.shimondeitel.stampcase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Stampcase:
    type: application
    platform: iOS
    sources:
      - path: Stampcase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampcase
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Stampcase/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StampcaseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StampcaseTests
      - path: Stampcase.storekit
    dependencies:
      - target: Stampcase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampcase.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StampcaseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StampcaseUITests
    dependencies:
      - target: Stampcase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampcase.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Stampcase:
    build:
      targets:
        Stampcase: all
        StampcaseTests: [test]
        StampcaseUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Stampcase.storekit
    test:
      config: Debug
      storeKitConfiguration: Stampcase.storekit
      targets:
        - StampcaseTests
        - StampcaseUITests
    archive:
      config: Release
